version: "3.8"

services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
    volumes:
      - ./data:/app/data
    networks:
      - halalcheck

  web:
    build: .
    restart: unless-stopped
    command: python -m flask --app web.app run --host=0.0.0.0 --port=5000
    ports:
      - "5000:5000"
    environment:
      - FLASK_DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-me}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
    volumes:
      - ./data:/app/data
      - ./web:/app/web
    networks:
      - halalcheck

networks:
  halalcheck:
    driver: bridge
